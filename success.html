<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In — Way For Men</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0E0E0F;
    --panel:#1B1B17;
    --bone:#EDEAE3;
    --bone-dim:#C9C5BA;
    --olive:#5C6B4F;
    --olive-bright:#7C8F66;
    --grey:#8C8A85;
    --line: rgba(237,234,227,0.12);
    --display: "Archivo", sans-serif;
    --body: "Source Serif 4", serif;
    --mono: "IBM Plex Mono", monospace;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    background:var(--black); color:var(--bone);
    font-family:var(--body); min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:40px 24px;
  }
  .inner{ max-width:480px; }
  .check{
    width:56px; height:56px; border-radius:50%;
    background:var(--olive); margin:0 auto 28px;
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
  }
  h1{
    font-family:var(--display); font-weight:900; text-transform:uppercase;
    font-size:clamp(26px,4vw,36px); letter-spacing:-0.01em; margin-bottom:16px;
  }
  p{
    font-family:var(--body); color:var(--bone-dim);
    font-size:16px; margin-bottom:12px; line-height:1.65;
  }
  .mono-note{
    font-family:var(--mono); font-size:12px; color:var(--grey);
    margin-top:28px; line-height:1.6;
  }
</style>
</head>
<body>
  <div class="inner">
    <div class="check">✓</div>
    <h1>You're in.</h1>
    <p>Payment confirmed. Check your inbox — you'll have an email with everything you need to book your first call and get started.</p>
    <p>If you don't see it within a few minutes, check your spam folder.</p>
    <div class="mono-note">Way For Men · The Anchor Method · 30-Day Program</div>
  </div>
</body>
</html>
